# Much of this code yoinked and modified from https://github.com/SR5-FoundryVTT/SR5-FoundryVTT
name: Release Module

on:
    workflow_dispatch:
        # Inputs the workflow accepts.
        inputs:
            name:
                # Friendly description to be shown in the UI instead of 'name'
                description: 'Version number to increment development branch to'
                # Default value if no value is explicitly provided
                default: '0'
                # Input has to be provided for the workflow to run
                required: true
                # The data type of the input
                type: string
#  release:
#    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout
      - uses: actions/checkout@v4
      # install deps
      - run: npm ci
      # cook packs
      - run: npm run cook
      # copy localizations
      - run: npm run copyLocalization

      # Substitute the Manifest and Download URLs in the module.json
      - name: Update system.json url
        uses: jossef/action-set-json-field@v2.1
        with:
          file: static/system.json
          field: url
          value: https://github.com/${{github.repository}}
      - name: Update system.json manifest
        uses: jossef/action-set-json-field@v2.1
        with:
          file: static/system.json
          field: manifest
          value: https://github.com/${{github.repository}}/releases/latest/download/module.json
      - name: Update system.json version
        uses: jossef/action-set-json-field@v2.1
        with:
          file: static/system.json
          field: version
          value: ${{github.event.release.tag_name}}
      - name: Update system.json download
        uses: jossef/action-set-json-field@v2.1
        with:
          file: static/system.json
          field: download
          value: https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/sfrpg-${{github.event.release.tag_name}}.zip

      # build src into dist
      - run: npm run build

      # create package
      - run: npm run package

